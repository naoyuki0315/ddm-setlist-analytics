<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDM Setlist Analytics</title>
  
  <!-- Tailwind CSS (デザイン用) -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM (機能用) -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel (ブラウザでReactを動かすための翻訳機) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // アイコンコンポーネント (Lucide icons の代用)
    const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
    const IconMusic = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15V6"/><path d="M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/><path d="M12 12H3"/><path d="M16 6H3"/><path d="M12 18H3"/></svg>;
    const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;

    // まだ集計データがない時の仮データ
    const dummyData = {
      lastUpdated: "未集計（仮データ表示中）",
      main: [
        { name: "マスターデータとGitHub Actionsを設定してください", count: 0, lastPlayed: "----" }
      ],
      encores: [],
      unknown: []
    };

    function App() {
      const [data, setData] = useState(null);
      const [activeTab, setActiveTab] = useState('main');

      useEffect(() => {
        // GitHub Actionsが生成した data.json を読み込む
        fetch('./data.json')
          .then(res => {
            if (!res.ok) throw new Error("Data not found");
            return res.json();
          })
          .then(jsonData => setData(jsonData))
          .catch(() => {
            console.log("初回起動 または data.json がないためダミーを表示します");
            setData(dummyData);
          });
      }, []);

      if (!data) return <div className="p-8 text-center text-gray-500">データを読み込み中...</div>;

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8">
          <div className="max-w-4xl mx-auto">
            <header className="mb-8">
              <h1 className="text-3xl font-bold text-gray-900 flex items-center gap-2">
                <span className="text-blue-600"><IconChart /></span>
                DDM Setlist Analytics
              </h1>
              <p className="text-gray-500 mt-2">最終更新: {data.lastUpdated}</p>
            </header>

            {/* タブ */}
            <div className="flex space-x-2 mb-6 border-b border-gray-200 overflow-x-auto">
              <button
                onClick={() => setActiveTab('main')}
                className={`py-2 px-4 whitespace-nowrap flex items-center gap-2 border-b-2 transition-colors ${
                  activeTab === 'main' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'
                }`}
              >
                <IconMusic /> 本編演奏回数
              </button>
              <button
                onClick={() => setActiveTab('encore')}
                className={`py-2 px-4 whitespace-nowrap flex items-center gap-2 border-b-2 transition-colors ${
                  activeTab === 'encore' ? 'border-purple-600 text-purple-600 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'
                }`}
              >
                <span className="w-4 h-4"><IconChart /></span> アンコール
              </button>
              <button
                onClick={() => setActiveTab('unknown')}
                className={`py-2 px-4 whitespace-nowrap flex items-center gap-2 border-b-2 transition-colors ${
                  activeTab === 'unknown' ? 'border-red-500 text-red-500 font-bold' : 'border-transparent text-gray-500 hover:text-gray-700'
                }`}
              >
                <IconAlert /> 要確認 ({data.unknown.length})
              </button>
            </div>

            {/* コンテンツ */}
            <main className="bg-white rounded-xl shadow-sm border border-gray-100 p-0 overflow-hidden">
              
              {/* 本編 */}
              {activeTab === 'main' && (
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-gray-50 text-gray-600 text-sm uppercase tracking-wider border-b border-gray-100">
                        <th className="p-4 font-semibold">曲名</th>
                        <th className="p-4 font-semibold text-center">回数</th>
                        <th className="p-4 font-semibold">最終演奏日</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {data.main.sort((a, b) => b.count - a.count).map((song, idx) => (
                        <tr key={idx} className="hover:bg-blue-50/50 transition-colors">
                          <td className="p-4 font-medium text-gray-900">{song.name}</td>
                          <td className="p-4 text-center">
                            <span className="inline-flex items-center justify-center bg-blue-100 text-blue-800 font-bold w-8 h-8 rounded-full">
                              {song.count}
                            </span>
                          </td>
                          <td className="p-4 text-gray-500 flex items-center gap-2">
                            <IconCalendar /> {song.lastPlayed}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {/* アンコール */}
              {activeTab === 'encore' && (
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse">
                    <thead>
                      <tr className="bg-purple-50 text-purple-800 text-sm uppercase tracking-wider border-b border-purple-100">
                        <th className="p-4 font-semibold">曲名 (アンコール)</th>
                        <th className="p-4 font-semibold text-center">回数</th>
                        <th className="p-4 font-semibold">最終演奏日</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {data.encores.sort((a, b) => b.count - a.count).map((song, idx) => (
                        <tr key={idx} className="hover:bg-purple-50/50 transition-colors">
                          <td className="p-4 font-medium text-gray-900">{song.name}</td>
                          <td className="p-4 text-center">
                            <span className="inline-flex items-center justify-center bg-purple-100 text-purple-800 font-bold w-8 h-8 rounded-full">
                              {song.count}
                            </span>
                          </td>
                          <td className="p-4 text-gray-500 flex items-center gap-2">
                             <IconCalendar /> {song.lastPlayed}
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}

              {/* 要確認 */}
              {activeTab === 'unknown' && (
                <div className="p-6">
                  <div className="bg-red-50 text-red-800 p-4 rounded-lg mb-6 flex items-start gap-3">
                    <span className="mt-0.5 text-red-600"><IconAlert /></span>
                    <p className="text-sm">マスターリスト（CSV）に存在しない曲名が抽出されました。表記揺れや新曲の可能性があります。</p>
                  </div>
                  <ul className="space-y-2">
                    {data.unknown.map((songName, idx) => (
                      <li key={idx} className="p-3 bg-gray-50 rounded border border-gray-200 font-medium text-gray-700">
                        {songName}
                      </li>
                    ))}
                  </ul>
                  {data.unknown.length === 0 && (
                    <p className="text-center text-gray-500 py-8">要確認の曲はありません 🎉</p>
                  )}
                </div>
              )}

            </main>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
