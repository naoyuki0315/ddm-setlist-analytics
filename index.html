<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>スズナ演奏曲ランキング</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 44'%3E%3Cpath d='M4 16 L11 22 L24 8 L37 22 L44 16 L40 38 L8 38 Z' fill='%23F4C430' stroke='%23D4A017' stroke-width='1.5' stroke-linejoin='round'/%3E%3Ccircle cx='4' cy='16' r='3' fill='%23F4C430' stroke='%23D4A017' stroke-width='1'/%3E%3Ccircle cx='44' cy='16' r='3' fill='%23F4C430' stroke='%23D4A017' stroke-width='1'/%3E%3Ccircle cx='24' cy='8' r='3' fill='%23F4C430' stroke='%23D4A017' stroke-width='1'/%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="./icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800">
  <div id="root" class="max-w-2xl mx-auto sm:p-4">
    <div class="px-4 pt-4 sm:px-0 sm:pt-0">
      <h1 class="text-xl font-bold mb-6 text-gray-900 leading-tight">スズナ演奏曲<br>ライブ演奏回数ランキング</h1>
      <div id="tabs" class="flex gap-1 bg-gray-100 rounded-lg p-1 mb-4"></div>
      <div id="filter-area" class="mb-4">
        <div class="relative">
          <select id="year-select" onchange="render()" class="appearance-none w-full p-3 pr-10 border-2 border-blue-200 rounded-lg bg-white font-bold text-blue-700"></select>
          <div class="pointer-events-none absolute right-3 top-1/2 -translate-y-1/2 text-blue-500 text-base">▼</div>
        </div>
      </div>
    </div>
    <table class="w-full bg-white sm:shadow sm:rounded overflow-hidden">
      <tbody id="list"></tbody>
    </table>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onclick="document.getElementById('modal').classList.add('hidden')">
    <div class="bg-white rounded-lg w-full max-w-md max-h-[80vh] overflow-hidden flex flex-col" onclick="event.stopPropagation()">
      <div class="p-4 border-b font-bold flex justify-between">
        <span id="modal-title"></span>
        <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400">✕</button>
      </div>
      <div id="video-list" class="overflow-y-auto"></div>
    </div>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzWOELNEzNkvAb1Nld1Tjzv0_Z5mvRvuQdeH20jy-LYP0cycHgpWcpR6rcSBFqm-5lGKZYLgSmW4cg/pub?gid=842461559&single=true&output=csv';
    let rawData = null;
    let masterSongs = [];
    let currentTab = 'year';

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    // 【追加】"2026-05-16" のような日付を "2026/5/16" の表記にする
    function formatDate(d) {
      if (!d) return '記録なし';
      const [y, m, day] = d.split('-');
      return `${y}/${parseInt(m, 10)}/${parseInt(day, 10)}`;
    }

    async function init() {
      try {
        const cacheBuster = `?_=${new Date().getTime()}`;
        
        const [resCsv, resJson] = await Promise.all([
          fetch(CSV_URL).then(r => r.text()),
          fetch(`./data.json${cacheBuster}`).then(r => r.json())
        ]);
        
        masterSongs = resCsv.split('\n').slice(1).map(line => {
            const cols = line.split(',');
            return cols[1] ? cols[1].trim() : "";
        }).filter(name => name !== "");
        
        rawData = resJson;

        const select = document.getElementById('year-select');
        const now = new Date();
        const curY = now.getFullYear();
        const curM = now.getMonth() + 1;
        let periods = [{v:'all', l:'総合'}];
        for(let y = 2024; y <= curY; y++) {
          if (y === 2024) periods.push({v:'2024-2', l:'2024年後半'});
          else {
            periods.push({v:y+'-1', l:y+'年前半'});
            if (y < curY || curM > 6) periods.push({v:y+'-2', l:y+'年後半'});
            if (y < curY) periods.push({v:y+'-all', l:y+'年総合'});
          }
        }
        select.innerHTML = [periods[0], ...periods.slice(1).reverse()].map(o => `<option value="${o.v}">${o.l}</option>`).join('');
        render();
      } catch (e) { 
        console.error(e); 
        alert("データ読み込みエラーが発生しました。コンソールを確認してください。"); 
      }
    }

    function showVideos(name) {
      if (!rawData) return;
      const matches = [...(rawData.main || []), ...(rawData.encores || []), ...(rawData.unknown || [])].filter(s => s.name === name);
      const allUrls = matches.flatMap(s => s.urls || []);
      const list = document.getElementById('video-list');
      document.getElementById('modal-title').innerText = name;
      
      if (allUrls.length > 0) {
        list.innerHTML = allUrls.sort((a,b) => b.date.localeCompare(a.date))
          .map(u => `<a href="${u.url}" target="_blank" class="block p-4 border-b hover:bg-gray-50 text-blue-600 font-medium">${u.date} の演奏を見る</a>`).join('');
      } else {
        list.innerHTML = "<p class='p-8 text-center text-gray-500'>動画リンクが見つかりません</p>";
      }
      document.getElementById('modal').classList.remove('hidden');
    }

    document.getElementById('list').addEventListener('click', (e) => {
      const tr = e.target.closest('tr[data-name]');
      if (tr) showVideos(tr.dataset.name);
    });

    // 【追加】1〜3位用のマーク（王冠の中に「1位」、金/銅メダルの中に「2位」「3位」）
    // サイズは4位の文字(15px)の1.6倍 ＝ 24px相当を基準にする
    function crownBadge(text) {
      return `
      <svg viewBox="0 0 48 44" width="62" height="57" class="inline-block align-middle shrink-0">
        <path d="M4 16 L11 22 L24 8 L37 22 L44 16 L40 38 L8 38 Z" fill="#F4C430" stroke="#D4A017" stroke-width="1.5" stroke-linejoin="round"/>
        <circle cx="4" cy="16" r="3" fill="#F4C430" stroke="#D4A017" stroke-width="1"/>
        <circle cx="44" cy="16" r="3" fill="#F4C430" stroke="#D4A017" stroke-width="1"/>
        <circle cx="24" cy="8" r="3" fill="#F4C430" stroke="#D4A017" stroke-width="1"/>
        <text x="24" y="32" font-size="13" font-weight="bold" fill="#7A5C00" text-anchor="middle">${text}</text>
      </svg>`;
    }
    function medalBadge(text, color, ring, txt) {
      return `
      <svg viewBox="0 0 44 48" width="57" height="62" class="inline-block align-middle shrink-0">
        <path d="M14 6 L18 22 L26 22 L30 6" stroke="#C0392B" stroke-width="3" fill="none"/>
        <circle cx="22" cy="32" r="14" fill="${color}" stroke="${ring}" stroke-width="2"/>
        <circle cx="22" cy="32" r="10" fill="none" stroke="${ring}" stroke-width="1" opacity="0.5"/>
        <text x="22" y="37" font-size="11" font-weight="bold" fill="${txt}" text-anchor="middle">${text}</text>
      </svg>`;
    }
    function rankMark(rank) {
      if (rank === 0) return crownBadge('1位');
      if (rank === 1) return medalBadge('2位', '#E8E8E8', '#B0B0B0', '#555555');
      if (rank === 2) return medalBadge('3位', '#E8A87C', '#C87941', '#6B3410');
      if (rank !== null) return `<span class="inline-block w-[62px] text-center font-bold text-[15px] text-gray-700 shrink-0">${rank+1}位</span>`;
      return '';
    }

    // 【追加】タップしやすい大きめの行（マーク+曲名+最終演奏日 / 回数 / ›マーク）を作る共通関数
    function buildRow(rank, name, count, lastPlayed, nameColorClass, countColorClass, chevronClass) {
      return `
        <tr class="border-b active:bg-gray-100 cursor-pointer" data-name="${escapeHtml(name)}">
          <td class="pl-3 py-4">
            <div class="flex items-center gap-2">
              ${rankMark(rank)}
              <div>
                <div class="font-bold text-[15px] ${nameColorClass}">${escapeHtml(name)}</div>
                <div class="text-xs text-gray-400 mt-1">最終演奏: ${formatDate(lastPlayed)}</div>
              </div>
            </div>
          </td>
          <td class="pr-3 text-right whitespace-nowrap align-middle">
            <div class="font-bold text-xl ${countColorClass}">${count}回</div>
          </td>
          <td class="pr-4 align-middle">
            <span class="inline-flex items-center justify-center w-8 h-8 rounded-full ${chevronClass} font-bold text-lg">›</span>
          </td>
        </tr>
      `;
    }

    function render() {
      if (!rawData) return;
      
      const tabs = { year: 'ライブ演奏回数', encore: 'アンコール演奏回数', unknown: '持ち曲以外' };
      document.getElementById('tabs').innerHTML = Object.entries(tabs).map(([id, label]) => 
        `<button onclick="currentTab='${id}'; render()" class="flex-1 py-2 text-sm font-bold rounded-md transition-colors ${currentTab === id ? 'bg-white text-blue-600 shadow' : 'text-gray-500'}">${label}</button>`
      ).join('');

      document.getElementById('filter-area').classList.toggle('hidden', currentTab === 'unknown');

      // 1. 持ち曲以外（unknown）タブ
      if (currentTab === 'unknown') {
        const unknownStats = [...(rawData.unknown || [])].sort((a, b) => b.count - a.count);

        document.getElementById('list').innerHTML = unknownStats.map(s => 
          buildRow(null, s.name, s.count, s.lastPlayed, 'text-red-600', 'text-red-500', 'bg-red-100 text-red-500')
        ).join('') || "<tr><td colspan='3' class='p-8 text-center text-gray-500'>持ち曲以外はありません</td></tr>";
        return;
      }

      // 2. 通常のランキング処理
      let source = currentTab === 'encore' ? [...(rawData.encores || [])] : [...(rawData.main || []), ...(rawData.encores || [])];
      
      const val = document.getElementById('year-select').value;
      if (val !== 'all') {
        const [y, type] = val.split('-');
        source = source.map(s => ({ ...s, playDates: (s.playDates || []).filter(d => {
          const [sy, sm] = d.split('-');
          if (sy !== y) return false;
          if (type === '1') return sm <= '06';
          if (type === '2') return sm > '06';
          return true;
        })})).filter(s => s.playDates.length > 0);
      }

      // 【変更】countに加えて、絞り込んだ期間内での最終演奏日（lastPlayed）も集計する
      const map = {};
      source.forEach(s => {
        if (!map[s.name]) map[s.name] = { name: s.name, count: 0, lastPlayed: '' };
        map[s.name].count += s.playDates.length;
        const maxDate = s.playDates.reduce((max, d) => d > max ? d : max, '');
        if (maxDate > map[s.name].lastPlayed) map[s.name].lastPlayed = maxDate;
      });

      document.getElementById('list').innerHTML = Object.values(map).sort((a,b) => b.count - a.count).map((s, i) => 
        buildRow(i, s.name, s.count, s.lastPlayed, 'text-gray-900', 'text-blue-600', 'bg-blue-100 text-blue-500')
      ).join('') || "<tr><td colspan='3' class='p-8 text-center text-gray-500'>該当する期間の演奏データがありません</td></tr>";
    }
    init();
  </script>
</body>
</html>
