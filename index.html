<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DDM Setlist Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect, useMemo } = React;
    const e = React.createElement;

    function App() {
      const [data, setData] = useState(null);
      const [activeTab, setActiveTab] = useState('total');

      useEffect(() => {
        fetch('./data.json')
          .then(res => res.json())
          .then(setData)
          .catch(() => setData({ lastUpdated: "データなし", main: [], encores: [], unknown: [] }));
      }, []);

      // データの集計ロジック（ここを正確に再現）
      const combinedData = useMemo(() => {
        if (!data) return [];
        const map = {};
        const process = (arr, isEncore) => {
          (arr || []).forEach(song => {
            if (!map[song.name]) map[song.name] = { name: song.name, count: 0 };
            map[song.name].count += (song.playDates ? song.playDates.length : 0);
          });
        };
        process(data.main, false);
        process(data.encores, true);
        return Object.values(map).sort((a, b) => b.count - a.count);
      }, [data]);

      if (!data) return e("div", {className: "p-8 text-center"}, "読み込み中...");

      return e("div", {className: "p-4"},
        e("h1", {className: "text-xl font-bold mb-4"}, "📊 DDM Setlist Analytics"),
        e("div", {className: "flex gap-2 mb-4"},
          ["total", "encore", "unknown"].map(tab => 
            e("button", {
              key: tab,
              onClick: () => setActiveTab(tab),
              className: `px-3 py-1 border ${activeTab === tab ? "bg-blue-500 text-white" : ""}`
            }, tab)
          )
        ),
        e("table", {className: "w-full text-left"},
          e("thead", {className: "bg-gray-100"},
            e("tr", null, e("th", {className: "p-2"}, "曲名"), e("th", {className: "p-2"}, "回数"))
          ),
          e("tbody", null,
            combinedData.map((s, i) => 
              e("tr", {key: i, className: "border-t"},
                e("td", {className: "p-2"}, s.name),
                e("td", {className: "p-2"}, s.count)
              )
            )
          )
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
