<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DDM Setlist Analytics</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-4">
  <div id="root" class="max-w-2xl mx-auto">
    <h1 class="text-xl font-bold mb-4">📊 DDM Setlist Analytics</h1>
    <div id="tabs" class="flex gap-2 mb-4"></div>
    <table class="w-full bg-white shadow rounded">
      <tbody id="list"></tbody>
    </table>
  </div>

  <script>
    let globalData = null;
    const listEl = document.getElementById('list');
    const tabsEl = document.getElementById('tabs');

    async function loadData() {
      try {
        const res = await fetch('./data.json');
        globalData = await res.json();
        render('total');
      } catch (e) {
        listEl.innerHTML = "<tr><td class='p-4'>データ読み込みエラー</td></tr>";
      }
    }

    function render(tab) {
      // タブ生成
      tabsEl.innerHTML = ['total', 'encore', 'unknown'].map(t => 
        `<button onclick="render('${t}')" class="px-3 py-1 border ${tab === t ? 'bg-blue-600 text-white' : 'bg-gray-100'}">${t.toUpperCase()}</button>`
      ).join('');

      // 集計
      const map = {};
      [...(globalData.main || []), ...(globalData.encores || [])].forEach(s => {
        if (!map[s.name]) map[s.name] = { name: s.name, count: 0, last: s.lastPlayed || "" };
        map[s.name].count += (s.playDates || []).length;
      });
      const sorted = Object.values(map).sort((a, b) => b.count - a.count);

      // リスト描画
      listEl.innerHTML = sorted.map((s, i) => `
        <tr class="border-t">
          <td class="p-3">
            <div class="font-bold">${i < 3 ? ['👑','🥈','🥉'][i] : ''} ${s.name}</div>
            <div class="text-xs text-gray-500">${s.last}</div>
          </td>
          <td class="text-right p-3 font-bold text-blue-600">${s.count}回</td>
        </tr>
      `).join('');
    }

    loadData();
  </script>
</body>
</html>
