<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDM Setlist Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    // JSXを使わず、標準のReact.createElementで記述します
    const { useState, useEffect, useMemo } = React;

    const App = () => {
      const [data, setData] = useState(null);

      useEffect(() => {
        fetch('./data.json')
          .then(res => res.json())
          .then(setData)
          .catch(() => setData({ lastUpdated: "データなし", main: [], encores: [], unknown: [] }));
      }, []);

      if (!data) return React.createElement("div", {className: "p-8 text-center"}, "読み込み中...");

      // ここにメインの表示内容を記述します
      return React.createElement("div", {className: "p-8"}, 
        React.createElement("h1", {className: "text-2xl font-bold"}, "Drop Down Mama 集計"),
        React.createElement("p", null, "データ最終更新: " + data.lastUpdated)
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
