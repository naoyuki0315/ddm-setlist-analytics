<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DDM Setlist Analytics</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script>
    const { useState, useEffect, useMemo } = React;
    const e = React.createElement;

    function RankBadge({ rank }) {
      if (rank === 1) return e("span", {className: "text-xl"}, "👑");
      if (rank === 2) return e("span", {className: "text-lg"}, "🥈");
      if (rank === 3) return e("span", {className: "text-lg"}, "🥉");
      return e("span", {className: "text-gray-500 font-bold"}, rank + "位");
    }

    function App() {
      const [data, setData] = useState(null);
      const [activeTab, setActiveTab] = useState('total');

      useEffect(() => {
        fetch('./data.json')
          .then(res => res.json())
          .then(setData)
          .catch(() => setData({ lastUpdated: "データなし", main: [], encores: [], unknown: [] }));
      }, []);

      if (!data) return e("div", {className: "p-8 text-center"}, "Loading...");

      // 総合ランキング集計
      const combined = useMemo(() => {
        const map = {};
        [...data.main, ...data.encores].forEach(s => {
          if (!map[s.name]) map[s.name] = { name: s.name, count: 0, lastPlayed: s.lastPlayed || "" };
          map[s.name].count += (s.playDates ? s.playDates.length : 0);
          if (s.lastPlayed > map[s.name].lastPlayed) map[s.name].lastPlayed = s.lastPlayed;
        });
        return Object.values(map).sort((a, b) => b.count - a.count);
      }, [data]);

      // アンコールランキング集計
      const encoreOnly = useMemo(() => {
        return (data.encores || []).map(s => ({
          name: s.name, count: s.playDates ? s.playDates.length : 0, lastPlayed: s.lastPlayed
        })).sort((a, b) => b.count - a.count);
      }, [data]);

      const currentList = activeTab === 'total' ? combined : (activeTab === 'encore' ? encoreOnly : []);

      return e("div", {className: "min-h-screen bg-gray-50 p-4"},
        e("div", {className: "max-w-4xl mx-auto"},
          e("h1", {className: "text-2xl font-bold mb-4"}, "📊 DDM Setlist Analytics"),
          e("div", {className: "flex gap-2 border-b mb-6"},
            [{id:'total',name:'総合'},{id:'encore',name:'アンコール'},{id:'unknown',name:'要確認'}].map(tab => 
              e("button", { key: tab.id, onClick: () => setActiveTab(tab.id), 
                className: `px-4 py-2 font-bold ${activeTab === tab.id ? "border-b-2 border-blue-600 text-blue-600" : "text-gray-500"}`
              }, tab.name)
            )
          ),
          activeTab === 'unknown' ? e("div", null, (data.unknown || []).map((s,i) => e("p", {key:i}, s))) :
          e("table", {className: "w-full bg-white shadow rounded"},
            e("tbody", null, currentList.map((s, i) => 
              e("tr", {key: i, className: "border-t p-4"},
                e("td", {className: "p-3"}, e(RankBadge, {rank: i + 1})),
                e("td", {className: "p-3"}, e("div", {className: "font-bold"}, s.name), e("div", {className: "text-xs text-gray-400"}, s.lastPlayed)),
                e("td", {className: "p-3 text-right font-bold text-blue-600"}, s.count + "回")
              )
            ))
          )
        )
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
