<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>スズナ演奏曲ランキング</title>
  <link rel="icon" href="./icon.png" type="image/png">
  <link rel="apple-touch-icon" href="./icon.png">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 p-4">
  <div id="root" class="max-w-2xl mx-auto">
    <h1 class="text-xl font-bold mb-6 text-gray-900 leading-tight">スズナ演奏曲<br>ライブ演奏回数ランキング</h1>
    <div id="tabs" class="flex gap-4 border-b mb-4"></div>
    <div id="filter-area" class="mb-4">
      <select id="year-select" onchange="render()" class="p-2 border rounded w-full bg-white"></select>
    </div>
    <table class="w-full bg-white shadow rounded overflow-hidden">
      <tbody id="list"></tbody>
    </table>
  </div>

  <div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50" onclick="document.getElementById('modal').classList.add('hidden')">
    <div class="bg-white rounded-lg w-full max-w-md max-h-[80vh] overflow-hidden flex flex-col" onclick="event.stopPropagation()">
      <div class="p-4 border-b font-bold flex justify-between">
        <span id="modal-title"></span>
        <button onclick="document.getElementById('modal').classList.add('hidden')" class="text-gray-400">✕</button>
      </div>
      <div id="video-list" class="overflow-y-auto"></div>
    </div>
  </div>

  <script>
    const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vTzWOELNEzNkvAb1Nld1Tjzv0_Z5mvRvuQdeH20jy-LYP0cycHgpWcpR6rcSBFqm-5lGKZYLgSmW4cg/pub?gid=842461559&single=true&output=csv';
    let rawData = null;
    let masterSongs = [];
    let currentTab = 'year';

    async function init() {
      try {
        const [resCsv, resJson] = await Promise.all([
          fetch(CSV_URL).then(r => r.text()),
          fetch('./data.json').then(r => r.json())
        ]);
        masterSongs = resCsv.split('\n').slice(1).map(line => {
            const cols = line.split(',');
            return cols[1] ? cols[1].trim() : "";
        }).filter(name => name !== "");
        rawData = resJson;

        const select = document.getElementById('year-select');
        const now = new Date();
        const curY = now.getFullYear();
        const curM = now.getMonth() + 1;
        let periods = [{v:'all', l:'総合'}];
        for(let y = 2024; y <= curY; y++) {
          if (y === 2024) periods.push({v:'2024-2', l:'2024年後半'});
          else {
            if (y < curY || curM > 6) periods.push({v:y+'-1', l:y+'年前半'});
            if (y < curY || curM > 12) periods.push({v:y+'-2', l:y+'年後半'});
            if (y < curY) periods.push({v:y+'-all', l:y+'年総合'});
          }
        }
        select.innerHTML = [periods[0], ...periods.slice(1).reverse()].map(o => `<option value="${o.v}">${o.l}</option>`).join('');
        render();
      } catch (e) { console.error(e); alert("データ読み込みエラー"); }
    }

    function showVideos(name) {
      const song = [...rawData.main, ...rawData.encores].find(s => s.name === name);
      const list = document.getElementById('video-list');
      document.getElementById('modal-title').innerText = name;
      
      if (song && song.urls && song.urls.length > 0) {
        list.innerHTML = song.urls.sort((a,b) => b.date.localeCompare(a.date))
          .map(u => `<a href="${u.url}" target="_blank" class="block p-4 border-b hover:bg-gray-50 text-blue-600 font-medium">${u.date} の演奏を見る</a>`).join('');
      } else {
        list.innerHTML = "<p class='p-8 text-center text-gray-500'>動画リンクが見つかりません</p>";
      }
      document.getElementById('modal').classList.remove('hidden');
    }

    function render() {
      const tabs = { year: '年別', encore: 'アンコール年別', unknown: '持ち曲以外' };
      document.getElementById('tabs').innerHTML = Object.entries(tabs).map(([id, label]) => 
        `<button onclick="currentTab='${id}'; render()" class="pb-2 font-bold ${currentTab === id ? 'border-b-2 border-blue-600 text-blue-600' : 'text-gray-500'}">${label}</button>`
      ).join('');

      document.getElementById('filter-area').classList.toggle('hidden', currentTab === 'unknown');

      let source = currentTab === 'encore' ? [...rawData.encores] : [...rawData.main, ...rawData.encores];
      
      if (currentTab === 'unknown') {
        const unknown = [...new Set(source.filter(s => !masterSongs.includes(s.name)).map(s => s.name))];
        document.getElementById('list').innerHTML = unknown.map(name => `
          <tr class="border-t">
            <td class="p-3 text-red-600 font-bold">${name}</td>
          </tr>
        `).join('') || "<tr><td class='p-8 text-center'>持ち曲以外はありません</td></tr>";
        return;
      }

      const val = document.getElementById('year-select').value;
      if (val !== 'all') {
        const [y, type] = val.split('-');
        source = source.map(s => ({ ...s, playDates: s.playDates.filter(d => {
          const [sy, sm] = d.split('-');
          if (sy !== y) return false;
          if (type === '1') return sm <= '06';
          if (type === '2') return sm > '06';
          return true;
        })})).filter(s => s.playDates.length > 0);
      }

      const map = {};
      source.forEach(s => {
        if (!map[s.name]) map[s.name] = { name: s.name, count: 0 };
        map[s.name].count += s.playDates.length;
      });

      document.getElementById('list').innerHTML = Object.values(map).sort((a,b) => b.count - a.count).map((s, i) => `
        <tr class="border-t hover:bg-gray-50 cursor-pointer" onclick="showVideos('${s.name}')">
          <td class="p-3 font-bold">${i < 3 ? ['👑','🥈','🥉'][i] : (i+1)+'位'} ${s.name}</td>
          <td class="text-right p-3 font-bold text-blue-600">${s.count}回</td>
        </tr>
      `).join('');
    }
    init();
  </script>
</body>
</html>
