<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DDM Setlist Analytics</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const IconChart = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></svg>;
    const IconMusic = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15V6"/><path d="M18.5 18a2.5 2.5 0 1 0 0-5 2.5 2.5 0 0 0 0 5Z"/><path d="M12 12H3"/><path d="M16 6H3"/><path d="M12 18H3"/></svg>;
    const IconAlert = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>;
    const IconCalendar = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>;
    const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>;

    const RankBadge = ({ rank }) => {
      if (rank === 1) return <span className="text-yellow-500 font-bold text-xl drop-shadow-sm">👑 1位</span>;
      if (rank === 2) return <span className="text-gray-400 font-bold text-lg drop-shadow-sm">🥈 2位</span>;
      if (rank === 3) return <span className="text-amber-700 font-bold text-lg drop-shadow-sm">🥉 3位</span>;
      return <span className="text-gray-500 font-bold">{rank}位</span>;
    };

    function App() {
      const [data, setData] = useState(null);
      const [activeTab, setActiveTab] = useState('total'); // 初期タブを総合に変更
      const [filterType, setFilterType] = useState('all');
      const [filterValue, setFilterValue] = useState('');

      useEffect(() => {
        fetch('./data.json')
          .then(res => res.json())
          .then(setData)
          .catch(() => setData({ lastUpdated: "データなし", main: [], encores: [], unknown: [] }));
      }, []);

      const periods = useMemo(() => {
        if (!data) return { years: [], quarters: [], halfYears: [] };
        const allDates = [...data.main, ...data.encores].flatMap(s => s.playDates || []);
        const years = [...new Set(allDates.map(d => d.substring(0, 4)))].sort().reverse();
        const quarters = [...new Set(allDates.map(d => {
            const y = d.substring(0, 4);
            const m = parseInt(d.substring(5, 7));
            return `${y}-Q${Math.ceil(m / 3)}`;
        }))].sort().reverse();
        const halfYears = [...new Set(allDates.map(d => {
            const y = d.substring(0, 4);
            const m = parseInt(d.substring(5, 7));
            return `${y}-H${m <= 6 ? '1' : '2'}`;
        }))].sort().reverse();
        return { years, quarters, halfYears };
      }, [data]);

      useEffect(() => {
        if (filterType === 'year' && periods.years.length) setFilterValue(periods.years[0]);
        if (filterType === 'quarter' && periods.quarters.length) setFilterValue(periods.quarters[0]);
        if (filterType === 'halfYear' && periods.halfYears.length) setFilterValue(periods.halfYears[0]);
      }, [filterType, periods]);

      // ★ 新機能：本編とアンコールのデータを合体させて「総合ランキング」のベースを作る
      const combinedData = useMemo(() => {
        if (!data) return [];
        const map = {};
        const process = (arr, isEncore) => {
            (arr || []).forEach(song => {
                if (!map[song.name]) {
                    map[song.name] = { name: song.name, mainDates: [], encoreDates: [], lastPlayed: "" };
                }
                if (isEncore) {
                    map[song.name].encoreDates.push(...(song.playDates || []));
                } else {
                    map[song.name].mainDates.push(...(song.playDates || []));
                }
                if (!map[song.name].lastPlayed || song.lastPlayed > map[song.name].lastPlayed) {
                    map[song.name].lastPlayed = song.lastPlayed;
                }
            });
        };
        process(data.main, false);
        process(data.encores, true);
        return Object.values(map);
      }, [data]);

      if (!data) return <div className="p-8 text-center text-gray-500">データを読み込み中...</div>;

      const filterFn = (d) => {
        if (filterType === 'all') return true;
        if (filterType === 'year') return d.startsWith(filterValue);
        if (filterType === 'quarter') {
            const m = parseInt(d.substring(5, 7));
            return `${d.substring(0, 4)}-Q${Math.ceil(m / 3)}` === filterValue;
        }
        if (filterType === 'halfYear') {
            const m = parseInt(d.substring(5, 7));
            const h = m <= 6 ? '1' : '2';
            return `${d.substring(0, 4)}-H${h}` === filterValue;
        }
        return true;
      };

      // 総合ランキングの集計
      const filteredTotal = combinedData.map(song => {
          const mDates = song.mainDates.filter(filterFn);
          const eDates = song.encoreDates.filter(filterFn);
          const totalCount = mDates.length + eDates.length;
          
          let latest = "";
          if (filterType !== 'all') {
              [...mDates, ...eDates].forEach(d => { if (d > latest) latest = d; });
          } else {
              latest = song.lastPlayed;
          }
          
          return {
              name: song.name,
              count: totalCount,
              encoreCount: eDates.length, // うちアンコールの回数を記録
              lastPlayed: latest || song.lastPlayed
          };
      }).filter(s => s.count > 0).sort((a, b) => b.count - a.count);

      // アンコール単独ランキングの集計
      const filteredEncores = (data.encores || []).map(song => {
          const eDates = (song.playDates || []).filter(filterFn);
          let latest = "";
          if (filterType !== 'all') {
              eDates.forEach(d => { if (d > latest) latest = d; });
          } else {
              latest = song.lastPlayed;
          }
          return {
              name: song.name,
              count: eDates.length,
              lastPlayed: latest || song.lastPlayed
          };
      }).filter(s => s.count > 0).sort((a, b) => b.count - a.count);

      let currentRankTotal = 1;
      let lastCountTotal = -1;
      let currentRankEncore = 1;
      let lastCountEncore = -1;

      return (
        <div className="min-h-screen bg-gray-50 text-gray-800 font-sans p-4 md:p-8">
          <div className="max-w-4xl mx-auto">
            <header className="mb-6 flex items-start justify-between gap-4">
              <div>
                <h1 className="text-2xl md:text-3xl font-bold text-gray-900 flex items-center gap-2">
                  <span className="text-blue-600"><IconChart /></span> Drop Down Mama 集計
                </h1>
                <a 
                  href="https://github.com/naoyuki0315/ddm-setlist-analytics/actions/workflows/update_data.yml" 
                  target="_blank" 
                  rel="noopener noreferrer"
                  className="inline-block text-gray-500 mt-1 text-xs md:text-sm transition-colors hover:text-blue-500 active:text-blue-600"
                  title="Admin Console"
                >
                  データ最終同期: {data.lastUpdated}
                </a>
              </div>
              <a 
                href="https://github.com/naoyuki0315/ddm-setlist-analytics/actions/workflows/update_data.yml" 
                target="_blank" 
                rel="noopener noreferrer"
                className="hidden sm:inline-flex items-center gap-1 text-gray-400 hover:text-gray-600 text-xs transition-colors py-1 px-2 mt-1"
                title="Admin Console"
              >
                <IconSettings /> Console
              </a>
            </header>

            <div className="mb-6 bg-white p-4 rounded-xl shadow-sm border border-gray-200 flex flex-wrap items-center gap-3">
              <span className="font-semibold text-gray-700 text-sm flex items-center gap-2"><IconCalendar />集計期間:</span>
              <select 
                className="bg-gray-50 border border-gray-300 text-gray-900 text-sm rounded-lg p-2 focus:ring-blue-500 focus:border-blue-500 outline-none"
                value={filterType} 
                onChange={(e) => setFilterType(e.target.value)}
              >
                <option value="all">全期間 (累計)</option>
                <option value="year">年ごと</option>
                <option value="halfYear">半年ごと</option>
                <option value="quarter">四半期ごと</option>
              </select>
              
              {filterType !== 'all' && (
                <select 
                  className="bg-blue-50 border border-blue-300 text-blue-900 font-medium text-sm rounded-lg p-2 focus:ring-blue-500 outline-none"
                  value={filterValue} 
                  onChange={(e) => setFilterValue(e.target.value)}
                >
                  {filterType === 'year' && periods.years.map(y => <option key={y} value={y}>{y}年</option>)}
                  {filterType === 'quarter' && periods.quarters.map(q => <option key={q} value={q}>{q.replace('-Q', '年 第')}四半期</option>)}
                  {filterType === 'halfYear' && periods.halfYears.map(h => <option key={h} value={h}>{h.replace('-H1', '年 上半期').replace('-H2', '年 下半期')}</option>)}
                </select>
              )}
            </div>

            <div className="flex space-x-2 mb-4 border-b border-gray-200 overflow-x-auto">
              <button onClick={() => setActiveTab('total')} className={`py-2 px-4 whitespace-nowrap flex items-center gap-2 border-b-2 ${activeTab === 'total' ? 'border-blue-600 text-blue-600 font-bold' : 'border-transparent text-gray-500'}`}><IconMusic /> 総合 ({filteredTotal.length})</button>
              <button onClick={() => setActiveTab('encore')} className={`py-2 px-4 whitespace-nowrap flex items-center gap-2 border-b-2 ${activeTab === 'encore' ? 'border-purple-600 text-purple-600 font-bold' : 'border-transparent text-gray-500'}`}><span className="w-4 h-4"><IconChart /></span> アンコール ({filteredEncores.length})</button>
              <button onClick={() => setActiveTab('unknown')} className={`py-2 px-4 whitespace-nowrap flex items-center gap-2 border-b-2 ${activeTab === 'unknown' ? 'border-red-500 text-red-500 font-bold' : 'border-transparent text-gray-500'}`}><IconAlert /> 要確認 ({data.unknown.length})</button>
            </div>

            <main className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
              {/* 総合ランキングタブ */}
              {activeTab === 'total' && (
                <div className="overflow-x-auto">
                  <table className="w-full text-left whitespace-nowrap">
                    <thead>
                      <tr className="bg-gray-50 text-gray-600 text-sm uppercase">
                        <th className="p-4 font-semibold text-center w-24">順位</th>
                        <th className="p-4 font-semibold">曲名</th>
                        <th className="p-4 font-semibold text-center">総合回数</th>
                        <th className="p-4 font-semibold">最終演奏日</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {filteredTotal.map((song, idx) => {
                        if (song.count !== lastCountTotal) {
                          currentRankTotal = idx + 1;
                          lastCountTotal = song.count;
                        }
                        return (
                          <tr key={idx} className="hover:bg-blue-50/50 transition-colors">
                            <td className="p-4 text-center"><RankBadge rank={currentRankTotal} /></td>
                            <td className="p-4 font-bold text-gray-800 text-base md:text-lg">{song.name}</td>
                            <td className="p-4 text-center">
                              <div className="flex flex-col items-center justify-center gap-1">
                                <span className="inline-flex items-center justify-center bg-blue-100 text-blue-800 font-bold w-10 h-10 rounded-full text-lg shadow-inner">
                                  {song.count}
                                </span>
                                {/* アンコール実績がある曲のみ、バッジを表示 */}
                                {song.encoreCount > 0 && (
                                  <span className="text-[10px] md:text-xs text-purple-600 font-medium bg-purple-50 px-1.5 py-0.5 rounded border border-purple-100">
                                    うちｱﾝｺｰﾙ {song.encoreCount}回
                                  </span>
                                )}
                              </div>
                            </td>
                            <td className="p-4 text-sm text-gray-500">{song.lastPlayed}</td>
                          </tr>
                        );
                      })}
                      {filteredTotal.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-gray-500">データがありません</td></tr>}
                    </tbody>
                  </table>
                </div>
              )}

              {/* アンコール単独タブ */}
              {activeTab === 'encore' && (
                <div className="overflow-x-auto">
                  <table className="w-full text-left whitespace-nowrap">
                    <thead>
                      <tr className="bg-purple-50 text-purple-800 text-sm uppercase">
                        <th className="p-4 font-semibold text-center w-24">順位</th>
                        <th className="p-4 font-semibold">曲名</th>
                        <th className="p-4 font-semibold text-center">回数</th>
                        <th className="p-4 font-semibold">最終演奏日</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {filteredEncores.map((song, idx) => {
                        if (song.count !== lastCountEncore) {
                          currentRankEncore = idx + 1;
                          lastCountEncore = song.count;
                        }
                        return (
                          <tr key={idx} className="hover:bg-purple-50/50 transition-colors">
                            <td className="p-4 text-center"><RankBadge rank={currentRankEncore} /></td>
                            <td className="p-4 font-bold text-gray-800 text-base md:text-lg">{song.name}</td>
                            <td className="p-4 text-center">
                              <span className="inline-flex items-center justify-center bg-purple-100 text-purple-800 font-bold w-10 h-10 rounded-full text-lg shadow-inner">
                                {song.count}
                              </span>
                            </td>
                            <td className="p-4 text-sm text-gray-500">{song.lastPlayed}</td>
                          </tr>
                        );
                      })}
                      {filteredEncores.length === 0 && <tr><td colSpan="4" className="p-8 text-center text-gray-500">データがありません</td></tr>}
                    </tbody>
                  </table>
                </div>
              )}

              {/* 要確認タブ */}
              {activeTab === 'unknown' && (
                <div className="p-6">
                  <div className="bg-red-50 text-red-800 p-4 rounded-lg mb-6 flex items-start gap-3">
                    <span className="mt-0.5 text-red-600"><IconAlert /></span>
                    <p className="text-sm">マスターリストに完全一致しない曲が抽出されました。表記揺れ（スペース等）や新曲の可能性があります。</p>
                  </div>
                  <ul className="space-y-2">{data.unknown.map((song, idx) => <li key={idx} className="p-3 bg-gray-50 rounded border text-sm">{song}</li>)}</ul>
                </div>
              )}
            </main>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
