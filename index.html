<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>DDM Setlist Analytics</title>
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📊</text></svg>">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    const { useState, useEffect, useMemo } = React;
    const e = React.createElement;

    function App() {
      const [data, setData] = useState(null);
      const [tab, setTab] = useState('total');

      useEffect(() => {
        fetch('./data.json').then(r => r.json()).then(setData).catch(() => {});
      }, []);

      if (!data) return e("div", {className: "p-4"}, "読み込み中...");

      // データの集計ロジックをJSだけで記述
      const stats = useMemo(() => {
        const map = {};
        [...data.main, ...data.encores].forEach(s => {
          if (!map[s.name]) map[s.name] = { name: s.name, count: 0, last: s.lastPlayed || "" };
          map[s.name].count += (s.playDates || []).length;
          if ((s.lastPlayed || "") > map[s.name].last) map[s.name].last = s.lastPlayed;
        });
        return Object.values(map).sort((a, b) => b.count - a.count);
      }, [data]);

      return e("div", {className: "p-4 max-w-2xl mx-auto"},
        e("h1", {className: "text-xl font-bold mb-4"}, "📊 DDM Setlist Analytics"),
        e("div", {className: "flex gap-2 mb-4"},
          ["total", "encore", "unknown"].map(t => e("button", {
            key: t, onClick: () => setTab(t), 
            className: `px-3 py-1 border ${tab === t ? "bg-blue-600 text-white" : "bg-gray-100"}`
          }, t.toUpperCase()))
        ),
        tab === 'total' ? e("table", {className: "w-full"},
          e("tbody", null, stats.map((s, i) => e("tr", {key: i, className: "border-b"},
            e("td", {className: "py-2"}, 
              e("div", {className: "font-bold"}, (i < 3 ? ["👑", "🥈", "🥉"][i] : "") + " " + s.name),
              e("div", {className: "text-xs text-gray-500"}, s.last)
            ),
            e("td", {className: "text-right font-bold text-blue-600"}, s.count + "回")
          )))
        ) : e("div", null, "タブ: " + tab)
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(e(App));
  </script>
</body>
</html>
